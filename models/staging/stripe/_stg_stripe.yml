models:
  - name: stg_stripe__payments
    columns:
      - name: payment_id
        data_tests:
          - unique
          - not_null
      - name: order_id
        data_tests:
          - not_null
          - relationships:
              arguments: 
                to: ref('stg_jaffle_shop__orders')
                field: order_id
      - name: payment_method
        data_tests:
          - accepted_values:
              arguments: 
                values:
                  - bank_transfer
                  - coupon
                  - credit_card
                  - gift_card
      - name: payment_status
        data_tests:
          - accepted_values:
              arguments: 
                values:
                  - fail
                  - success