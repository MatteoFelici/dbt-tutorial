models:
  - name: stg_jaffle_shop__customers
    description: Table with one row per customer with their name
    columns:
      - name: customer_id
        description: Primary key for the customer table
        data_tests:
          - unique
          - not_null
      - name: first_name
        description: First name of the customer
      - name: last_name
        description: Last name of the customer
          
  - name: stg_jaffle_shop__orders
    description: Table with orders information (date and status)
    columns:
      - name: order_id
        description: Primary key for the orders table
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop__customers')
                field: customer_id
      - name: order_status
        description: "{{ doc('order_status') }}"
        data_tests:
          - accepted_values:
              arguments:
                values:
                - placed
                - completed
                - shipped
                - return_pending
                - returned
      - name: order_date
        description: Date when the order was placed